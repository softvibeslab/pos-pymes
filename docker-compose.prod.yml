version: '3.8'

# Docker Compose para Producción en Hostinger VPS
# Este archivo está optimizado para VPS con recursos limitados

services:
  # ============================================
  # API SERVER
  # ============================================
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: pos-pymes-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/local.db
      - LOG_LEVEL=info
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # POS FRONTEND
  # ============================================
  pos:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.pos
    container_name: pos-pymes-pos
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:3001}
    depends_on:
      - api
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # NGINX REVERSE PROXY (Opcional)
  # ============================================
  # Descomenta si quieres usar Nginx como proxy inverso
  # nginx:
  #   image: nginx:alpine
  #   container_name: pos-pymes-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - pos
  #     - api
  #   networks:
  #     - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  data:
    driver: local
