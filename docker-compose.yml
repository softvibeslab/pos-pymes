version: '3.8'

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/data/local.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  # POS App
  pos:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.pos
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped

  # Dashboard App
  dashboard:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dashboard
    ports:
      - "3002:3002"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
